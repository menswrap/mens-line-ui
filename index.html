<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MENS 客服後台</title>

  <style>
    body { font-family: sans-serif; padding: 10px; }
    button { margin-left: 5px; padding: 5px 10px; }
    .row { margin-bottom: 12px; }
  </style>
</head>
<body>

<h2>客戶列表</h2>
<button onclick="load()">刷新</button>

<div id="list"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwwPohoJwBWmDYVBa4womv3x1SKmH14mWDz_0zDjf1cba4NZ1Ez9diigxfoytQPZ9As/exec";

// ===== 載入 =====
async function load() {

  const res = await fetch(API + "?action=getCustomerState&t=" + Date.now());
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(c => {

    const userId = Object.values(c)[0];
    const displayName = Object.values(c)[8];
    const lastTime = Object.values(c)[1];

    const name = displayName || userId;
    const isControlled = lastTime && lastTime !== "";

    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
      <span>
        ${isControlled ? "🔴接管中" : "🟢AI中"}
      </span>
      ｜${name}
      <button onclick="takeover('${userId}')">接管</button>
      <button onclick="release('${userId}')">恢復</button>
    `;

    list.appendChild(div);
  });
}

// ===== 接管 =====
async function takeover(userId) {
  await fetch(API + "?action=takeover&userId=" + userId + "&t=" + Date.now());

  // 👉 強制重新抓資料（唯一正解）
  setTimeout(load, 300);
}

// ===== 恢復 =====
async function release(userId) {
  await fetch(API + "?action=release&userId=" + userId + "&t=" + Date.now());

  setTimeout(load, 300);
}

// 自動載入
load();

// ⭐ 每5秒自動刷新（手機用超重要）
setInterval(load, 5000);

</script>

</body>
</html>
