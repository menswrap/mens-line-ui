<!DOCTYPE html>
<html>
<head>
<link rel="apple-touch-icon" href="https://your-logo-url.png">
<meta charset="UTF-8">
<title>MENS 客服後台</title>

<style>
body {
  font-family: sans-serif;
  padding: 15px;
  background: #111;
  color: #fff;
}

button {
  padding: 10px 14px;
  font-size: 16px;
  border-radius: 8px;
  border: none;
}

.take { background: #ff4444; color: #fff; }
.release { background: #00c851; color: #fff; }

.row {
  background: #222;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.status {
  font-weight: bold;
}

.sub {
  font-size: 14px;
  color: #bbb;
  margin-top: 4px;
}
</style>

</head>
<body>

<h2>客戶列表</h2>
<button onclick="load()">手動刷新</button>

<div id="list"></div>

<script>

const API = "https://script.google.com/macros/s/AKfycbwwPohoJwBWmDYVBa4womv3x1SKmH14mWDz_0zDjf1cba4NZ1Ez9diigxfoytQPZ9As/exec";

async function load() {

  const res = await fetch(API + "?action=getCustomerState&t=" + Date.now());
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(c => {

    const values = Object.values(c);

    const userId = values[0];
    const lastTime = values[1];
    const carModel = values[4];
    const services = values[5];
    const displayName = values[8];

    const name = displayName || userId;
    const isControlled = lastTime && lastTime !== "";

    const serviceText = services ? services.replace(/[\[\]"]/g, "") : "未選擇項目";
    const carText = carModel || "未選擇車型";

    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
      <div class="status">
        ${isControlled ? "🔴接管中" : "🟢AI中"} ｜ ${name}
      </div>

      <div class="sub">🚗 ${carText}</div>
      <div class="sub">🧰 ${serviceText}</div>

      <div style="margin-top:10px;">
        <button class="take" onclick="takeover('${userId}')">接管</button>
        <button class="release" onclick="release('${userId}')">恢復</button>
      </div>
    `;

    list.appendChild(div);
  });
}

async function takeover(userId) {
  await fetch(API + "?action=takeover&userId=" + userId + "&t=" + Date.now());
  setTimeout(load, 300);
}

async function release(userId) {
  await fetch(API + "?action=release&userId=" + userId + "&t=" + Date.now());
  setTimeout(load, 300);
}

load();
setInterval(load, 5000);

</script>

</body>
</html>
